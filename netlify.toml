# Next.js app lives in the `site/` subfolder — point Netlify at it
[build]
  base    = "site"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Official Next.js runtime — handles SSR, dynamic routes, image optimization
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Long-lived cache for static assets — repeat visits become much faster.
[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/team/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/news/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/events/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/gallery/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
